# Xerocode.ai API — deploy from XeroCode-Backend on a separate host from the UI.
#
# Install (Debian/Ubuntu):
#   sudo cp config/nginx-api.conf /etc/nginx/sites-available/xerocode-api
#   sudo ln -s /etc/nginx/sites-available/xerocode-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Run the API on the same machine (see config/api-endpoints.json → local.port):
#   test -f package.json && test -d api && test -d server
#   npm install --omit=dev
#   test -d node_modules/express
#   node index.js
#   curl http://127.0.0.1:8787/api/health
#
# Keep it running with systemd (edit WorkingDirectory in config/xerocode-api.service first):
#   sudo cp config/xerocode-api.service /etc/systemd/system/
#   sudo systemctl daemon-reload
#   sudo systemctl enable --now xerocode-api
#   sudo systemctl status xerocode-api
#
# Point the UI build (XeroCode-Frontend) at production via config/api-endpoints.json (production.baseUrl), then
# rebuild the UI. Do not include /api in baseUrl; the app requests paths like /api/auth/login.
#
# AWS ALB/ELB: a 502 from awselb/2.0 means the load balancer cannot reach a healthy target.
# Register the instance or target group on the API port (config/api-endpoints.json → local.port), set the health check to
# GET /api/health, and allow the load balancer security group to reach that port on the instance.

upstream xerocode_api {
    server 127.0.0.1:8787;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name apis.xerocode.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apis.xerocode.ai;

    ssl_certificate     /etc/letsencrypt/live/apis.xerocode.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apis.xerocode.ai/privkey.pem;

    client_max_body_size 40m;

    location /api/ {
        proxy_pass http://xerocode_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /api {
        return 308 /api/;
    }

    location / {
        return 404;
    }
}
