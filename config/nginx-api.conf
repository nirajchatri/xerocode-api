# Xerocode.ai API — HTTP reverse proxy for an ALB that terminates HTTPS.
#
# Install (Debian/Ubuntu):
#   sudo cp config/nginx-api.conf /etc/nginx/sites-available/xerocode-api
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo ln -sf /etc/nginx/sites-available/xerocode-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   curl -s http://127.0.0.1:8787/api/health
#   curl -s -H 'Host: apis.xerocode.ai' http://127.0.0.1/api/health
# If nginx returns 502, the Node API is not listening on 127.0.0.1:8787. Check:
#   sudo systemctl status xerocode-api
#   sudo journalctl -u xerocode-api -n 50 --no-pager
#
# Point the ALB target group at HTTP port 80 on this instance. Health check: GET /api/health.
# Register only instances where `curl http://127.0.0.1:8787/api/health` returns JSON. Mixed targets
# cause alternating 502 responses and browser "Could not reach the API" errors when CORS is missing.
# For HTTPS directly to nginx on :443, issue certs first, then enable config/nginx-api-ssl.conf.

map $http_origin $api_cors_origin {
    default $http_origin;
    "" "*";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name apis.xerocode.ai _;

    client_max_body_size 40m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $api_cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-User-Email, X-User-Name, x-user-email, x-user-name' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin $api_cors_origin always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-User-Email, X-User-Name, x-user-email, x-user-name' always;
        add_header Vary Origin always;

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection $http_connection;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /api {
        return 308 /api/;
    }

    location = / {
        return 308 /api/health;
    }

    location / {
        return 404;
    }
}
