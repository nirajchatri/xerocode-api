# Xerocode.ai API — HTTP reverse proxy for an ALB that terminates HTTPS.
#
# Install (Debian/Ubuntu):
#   sudo cp config/nginx-api.conf /etc/nginx/sites-available/xerocode-api
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo ln -sf /etc/nginx/sites-available/xerocode-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   curl -s -H 'Host: apis.xerocode.ai' http://127.0.0.1/api/health
#
# Point the ALB target group at HTTP port 80 on this instance. Health check: GET /api/health.
# For HTTPS directly to nginx on :443, issue certs first, then enable config/nginx-api-ssl.conf.

upstream xerocode_api {
    server 127.0.0.1:8787;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name apis.xerocode.ai _;

    client_max_body_size 40m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://xerocode_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /api {
        return 308 /api/;
    }

    location = / {
        return 308 /api/health;
    }

    location / {
        return 404;
    }
}
