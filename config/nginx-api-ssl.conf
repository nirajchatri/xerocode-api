# Optional HTTPS server for apis.xerocode.ai when the ALB forwards TLS to nginx on :443.
#
# Issue certificates first, then enable:
#   sudo certbot certonly --webroot -w /var/www/certbot -d apis.xerocode.ai
#   sudo cp config/nginx-api-ssl.conf /etc/nginx/sites-available/xerocode-api-ssl
#   sudo ln -sf /etc/nginx/sites-available/xerocode-api-ssl /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name apis.xerocode.ai _;

    ssl_certificate     /etc/letsencrypt/live/apis.xerocode.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apis.xerocode.ai/privkey.pem;

    client_max_body_size 40m;

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /api {
        return 308 /api/;
    }

    location = / {
        return 308 /api/health;
    }

    location / {
        return 404;
    }
}
